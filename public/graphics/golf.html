<text x="748" y="324" class="body" fill="#F2F0E8">PharmaGABA has been studied in</text><text x="748" y="350" class="body" fill="#F2F0E8">pressure-sensitive performance</text><text x="748" y="376" class="body" fill="#F2F0E8">settings and is associated with a</text><text x="748" y="402" class="body" fill="#F2F0E8">more composed zone-state profile</text><text x="748" y="428" class="body" fill="#F2F0E8">versus placebo.</text><foreignObject x="74" y="486" width="1052" height="262"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'DM Sans','Helvetica Neue',system-ui,sans-serif;color:#4A4838;font-size:15px;line-height:1.5"><p style="margin:0 0 12px">Illustrative representation based on clinical research evaluating PharmaGABA&#174; versus placebo during a standardized esports task. The study measured sensorimotor-rhythm activity as a physiological indicator associated with calm, sustained attention and cognitive engagement.</p><p style="margin:0 0 16px"><strong style="font-weight:700;color:#1C1B14">Source:</strong> Pharma Foods International Co., Ltd., &#8220;New Study: PharmaGABA&#174; Helps the Brain Achieve the &#8216;Zone&#8217; for Optimal Performance,&#8221; PharmaGABA.com, April 3, 2026.</p><div style="border-top:1px solid #D5D2C6;padding-top:14px"><p style="margin:0;color:#8A8775;font-size:13px;line-height:1.5">The values and progression shown are illustrative and do not reproduce the study&#8217;s measured data. The research evaluated PharmaGABA&#174; as an ingredient and was not conducted on the finished AVRO product. Individual results may vary.</p></div></div></foreignObject></svg></main></body></html>
